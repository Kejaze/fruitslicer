<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Fruit Slicer Game</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
        <link rel="stylesheet" href="">
    </head>
    <body>
        <div id="container">
            <div id="instructions">
                Slice Fruits
            </div>
        <div id="fruitcontainer">
            <div id="score">
                <div class="scoreDisplay"><img src="scr.png" alt="">
                    <span id="scoreValue">0</span></div>
            </div>
            <div id="trialsleft"></div>
            <div id="front">
                CZY JESTEŚ GOTÓW NA CIĘCIE? <br/>
                <img src="./don.png" alt="Fruit logo">
            </div>
            <img id="fruit1" class="fruit">
        </div>
        <div id="startReset">
            Start Game
        </div>
        <!--for game over block-->
        <div id="gameOver"></div>
        </div>
        <!--for audio files-->
        <audio id="slicesound">
            <source src=""></source>
            <source src=""></source>
            <source src=""></source>
        </audio>
        
        <script src="script.js"></script>
    </body>
</html>
